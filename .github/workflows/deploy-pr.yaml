# .github/workflows/deploy-pr.yml
name: 2 - Deploy Web Page PR

on:
  workflow_run:
    workflows: ["1 - Check and Build Web Page PR"]
    types: [completed]

# CRITICAL: Grant the workflow permission to write comments on PRs
permissions:
  pull-requests: write

jobs:
  deploy-preview:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    
    steps:
      - name: Download Site Artifact
        uses: actions/download-artifact@v4
        with:
          name: preview-site
          path: site/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # NEW: Download the PR metadata artifact
      - name: Download PR Number Artifact
        uses: actions/download-artifact@v4
        with:
          name: pr-metadata
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site/ --project-name=openshift-examples
          # Optional: Enable this if you want to have GitHub Deployments triggered
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}